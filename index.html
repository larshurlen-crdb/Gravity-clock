<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test</title>
<style>
* { margin:0; padding:0; }
body { background: #000; width:100vw; height:100vh; }
canvas { display:block; width:100vw; height:100vh; }
#msg { position:fixed; top:20px; left:20px; color:#fff; font:bold 32px Arial; z-index:99; }
</style>
</head>
<body>
<canvas id="c" width="1920" height="1080"></canvas>
<div id="msg">Loading...</div>
<script>
var msg = document.getElementById('msg');
try {
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');

// Draw immediately - no animation loop
ctx.fillStyle = ‘#F06BCC’;
ctx.fillRect(0, 0, 1920, 1080);

ctx.fillStyle = ‘#000’;
ctx.beginPath();
ctx.arc(960, 540, 470, 0, Math.PI * 2);
ctx.fill();

ctx.fillStyle = ‘#fff’;
ctx.font = ‘bold 80px Arial’;
ctx.textAlign = ‘center’;
ctx.textBaseline = ‘middle’;
ctx.fillText(‘GRAVITY CLOCK TEST OK’, 960, 540);

msg.textContent = ‘Canvas OK’;
} catch(e) {
msg.textContent = ’ERROR: ’ + e.message;
}
</script>

</body>
</html>
